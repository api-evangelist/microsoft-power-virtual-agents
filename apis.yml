apis:
  - aid: microsoft-power-virtual-agents:direct-line-api
    name: Copilot Studio Direct Line API
    tags:
      - Chatbots
      - Conversational AI
      - Direct Line
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://directline.botframework.com/
    humanURL: https://learn.microsoft.com/en-us/microsoft-copilot-studio/publication-connect-bot-to-custom-application
    properties:
      - url: https://learn.microsoft.com/en-us/microsoft-copilot-studio/publication-connect-bot-to-custom-application
        type: Documentation
    description: >-
      The Copilot Studio Direct Line API enables custom applications to
      communicate with bots built in Microsoft Copilot Studio (formerly
      Power Virtual Agents). It provides REST endpoints for starting
      conversations, sending messages, receiving bot responses, and
      managing conversation sessions for custom channel integrations.
  - aid: microsoft-power-virtual-agents:bot-management-api
    name: Copilot Studio Bot Management API
    tags:
      - Bot Management
      - Administration
      - Copilot Studio
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.example.com
    humanURL: https://learn.microsoft.com/en-us/microsoft-copilot-studio/
    properties:
      - url: https://learn.microsoft.com/en-us/microsoft-copilot-studio/
        type: Documentation
    description: >-
      The Copilot Studio management capabilities enable programmatic
      configuration and deployment of conversational AI agents. Developers
      can manage topics, entities, authentication settings, and channel
      configurations through Power Platform APIs and Dataverse integration.
