aid: microsoft-power-virtual-agents
name: Microsoft Power Virtual Agents
description: >-
  Microsoft Power Virtual Agents (now Copilot Studio) enables building
  AI-powered conversational chatbots without coding. It provides APIs for
  integrating bots with custom applications and managing bot configurations
  programmatically.
type: Index
